name: Build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: balena-io/deploy-to-balena-action@master
        id: deploy
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: chameleon/chi-edge-workers

      - name: Log release
        run: echo "Release ${{ steps.deploy.outputs.release_id }} (version ${{ steps.deploy.outputs.version }})"

      - name: Deploy to canary devices
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          pip install ./deploy_tools
          canary deploy ${{ steps.deploy.outputs.release_id }}
