name: Jetson Base Images

on:
  push:
    branches: [main]
    paths:
      - 'images/jetson-base/**'
  pull_request:
    paths:
      - 'images/jetson-base/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/chameleoncloud/chi-edge-workers

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: jetpack4.Dockerfile
            tag: t210-r32.7
          - dockerfile: jetpack5.Dockerfile
            tag: t194-r35.6
          - dockerfile: jetpack6.Dockerfile
            tag: t234-r36.5
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/jetson-base
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=sha,prefix=${{ matrix.tag }}-
            type=raw,value=${{ matrix.tag }}-{{date 'YYYYMMDD'}}
      - uses: docker/build-push-action@v6
        with:
          context: ./images/jetson-base
          file: ./images/jetson-base/${{ matrix.dockerfile }}
          target: base
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
