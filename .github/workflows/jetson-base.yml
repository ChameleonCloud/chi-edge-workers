name: Jetson Base Images

on:
  push:
    branches: [main]
    paths:
      - 'images/l4t-cuda/**'
  pull_request:
    paths:
      - 'images/l4t-cuda/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          workdir: ./images/l4t-cuda
          push: ${{ github.event_name != 'pull_request' }}
          targets: default
