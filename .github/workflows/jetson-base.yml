name: Jetson Base Images

on:
  push:
    branches: [main]
    paths:
      - 'images/jetson-base/**'
  pull_request:
    paths:
      - 'images/jetson-base/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        working-directory: images/jetson-base
        run: SHA=${{ github.sha }} docker buildx bake -f docker-bake.hcl --push

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        working-directory: images/jetson-base
        run: docker buildx bake -f docker-bake.hcl
